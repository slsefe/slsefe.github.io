# Site settings 配置站点
title: 'Welcome to slsefe.github.io'
description: '白银的个人博客'
keyword: '机器学习 深度学习 自然语言处理 推荐系统'
url: '' # your host

# if you don't need baseurl, you should leave this value blank.
baseurl: ''

# Navigation links
nav:
  home: '/'
  tags: '/tags.html'

# Footer
footer:
  since: 2017

# Author 配置博主信息
author: 'BaiYin'
nickname: ''
bio: 'ML DL NLP RS'
avatar: 'https://raw.githubusercontent.com/slsefe/slsefe.github.io/master/assets/img/profile.jpeg'

# Search
search: true

# Night mode
nightMode: true

# Comments
# disqus: false
# disqus_url: 'https://liaokeyu.disqus.com/embed.js'

# livere: true
# livere_uid: MTAyMC8zNDAzNi8xMDU3NA

# Reward 赞赏功能 by BaiYin
# reward:
  # enable: true
  # reward_comment: '真诚赞赏 手留余香'
  # wechatpay: 'https://raw.githubusercontent.com/slsefe/slsefe.github.io/master/assets/img/wechat.jpeg'
  # alipay: 'https://raw.githubusercontent.com/slsefe/slsefe.github.io/master/assets/img/alipay.jpeg'

# b2t 回到顶部 by BaiYin
b2t: true

# Share
social-share: true
social-share-items: ['wechat', 'weibo', 'douban', 'twitter']

# theme color 主题皮肤
theme-color: 'default'  # pink or default

cover: '/assets/img/hero.jpg'

# Post header background patterns (when the post no cover): circuitBoard, overlappingCircles, food, glamorous, ticTacToe, seaOfClouds
postPatterns: 'circuitBoard'

# SNS settings 配置社交网站url: email, weibo, zhihu, twitter, instagram, juejin, github, douban, facebook, dribble, uicn, jianshu, medium, linkedin
sns:
  email: 'mailto:baiyslsefe@gmail.com'
  github: '//github.com/slsefe'

# Tags 设置标签
recommend-tags: true # whether or not display recommend-tags on the sidebar
recommend-condition-size: 12 # a tag will be recommended if the size of it is more than this value

# Build settings
paginate: 10
paginate_path: 'page:num'
exclude: ['node_modules', 'dev', 'package.json', 'gulpfile.js', '.gitignore', 'README.md']

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# RSS
RSS: false

# Permalink
# See: https://github.com/kaeyleo/jekyll-theme-H2O/issues/35
permalink: /:year/:month/:day/:title.html

# Plugins
plugins: [jekyll-paginate]
